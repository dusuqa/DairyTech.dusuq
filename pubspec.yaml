name: dusuq
description: Multi-tenant Dairy Farm Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core + services
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  cloud_functions: ^5.0.0      # calls signUpOrgAdmin / inviteFarmer

  # State management + routing
  flutter_riverpod: ^2.5.1     # auth/profile providers
  go_router: ^14.2.0           # role-based route guards

  # UI utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
